<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>avidhd</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e8e8e8;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 24px 0;
      overflow: hidden;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #aaa;
      margin-bottom: 28px;
    }

    /* ── New-item dialog ────────────────────────────────── */
    .dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .dialog-overlay.open { display: flex; }

    .dialog-box {
      background: #1c1c24;
      border: 1px solid #2e2e3a;
      border-radius: 10px;
      padding: 20px 20px 16px;
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dialog-box input {
      background: #0f0f13;
      border: 1px solid #2e2e3a;
      border-radius: 7px;
      color: #e8e8e8;
      font-size: 0.95rem;
      outline: none;
      padding: 10px 12px;
      transition: border-color 0.15s;
      width: 100%;
    }
    .dialog-box input:focus { border-color: #5b5bf8; }

    .dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    button.dialog-cancel {
      background: none;
      border: 1px solid #2e2e3a;
      border-radius: 6px;
      color: #666;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 7px 14px;
      transition: color 0.1s, border-color 0.1s;
    }
    button.dialog-cancel:hover { color: #aaa; border-color: #555; }

    button.dialog-add {
      background: #5b5bf8;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 7px 16px;
      transition: background 0.15s;
    }
    button.dialog-add:hover { background: #4a4ae0; }

    /* ── Search bar ─────────────────────────────────────── */
    .search-bar {
      display: none;
      flex-shrink: 0;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 100%;
      margin-bottom: 10px;
      background: #1c1c24;
      border: 1px solid #5b5bf8;
      border-radius: 8px;
      padding: 8px 12px;
    }

    .search-bar.active { display: flex; }

    .search-icon { color: #5b5bf8; font-size: 0.85rem; flex-shrink: 0; }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: #e8e8e8;
      font-size: 0.95rem;
      outline: none;
    }

    .search-mode {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 10px;
      flex-shrink: 0;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .search-mode.open { background: #1e3a1e; color: #4caf50; }
    .search-mode.all  { background: #2a1e3a; color: #9c7cf8; }

    .search-hint {
      font-size: 0.7rem;
      color: #333;
      margin-bottom: 14px;
      width: 100%;
      max-width: 100%;
    }

    /* ── List wrapper (scrollable fill) ────────────────── */
    .list-wrapper {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      width: 100%;
      max-width: 100%;
      scrollbar-width: thin;
      scrollbar-color: #252535 transparent;
    }

    /* ── List ───────────────────────────────────────────── */
    ul {
      list-style: none;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px 0 12px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0d0d14;
      border: 1px solid #252535;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: grab;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s;
      user-select: none;
      outline: none;
    }

    li.selected { background: #1e1e30; border-color: #5b5bf8; }
    li.dragging  { opacity: 0.35; cursor: grabbing; }
    li.drag-over { background: #22223a; border-color: #5b5bf8; }

    /* done items */
    li.done {
      opacity: 0.45;
      cursor: default;
    }
    li.done .item-text { text-decoration: line-through; color: #888; }
    li.done .drag-handle { visibility: hidden; }
    li.done .move-btns   { visibility: hidden; }
    li.done.selected { border-color: #9c7cf8; background: #1a1a28; opacity: 0.75; }

    /* divider between open and done sections */
    li.section-divider {
      background: transparent;
      border-color: transparent;
      cursor: default;
      padding: 4px 0 2px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #333;
      text-transform: uppercase;
      gap: 0;
    }
    li.section-divider:hover { background: transparent; }

    .drag-handle { color: #333; font-size: 0.85rem; cursor: grab; padding: 0 2px; }
    li:hover:not(.done):not(.section-divider) .drag-handle { color: #555; }
    li.selected:not(.done) .drag-handle { color: #555; }

    .rank { font-size: 0.75rem; color: #555; min-width: 20px; text-align: right; }
    li.done .rank { color: #333; }

    .item-text { flex: 1; font-size: 0.95rem; color: #ffffff; font-weight: 500; }

    .item-edit {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid #5b5bf8;
      border-radius: 0;
      color: #e8e8e8;
      font-size: 0.95rem;
      outline: none;
      padding: 0 2px;
    }

    .move-btns { display: flex; flex-direction: column; gap: 2px; }

    button.move {
      background: none;
      border: 1px solid #2e2e3a;
      border-radius: 5px;
      color: #888;
      cursor: pointer;
      font-size: 0.65rem;
      line-height: 1;
      padding: 3px 6px;
      transition: color 0.1s, border-color 0.1s;
    }

    button.move:hover { color: #e8e8e8; border-color: #555; }
    button.move:disabled { opacity: 0.2; cursor: default; }

    button.remove {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 4px;
      transition: color 0.1s;
    }
    button.remove:hover { color: #e05555; }

    .pr-card.pr-selected { border-color: #5b5bf8; background: #13131e; }

    /* ── Snooze menu ────────────────────────────────── */
    .snooze-menu {
      display: none;
      position: fixed;
      background: #1c1c24;
      border: 1px solid #2e2e3a;
      border-radius: 8px;
      padding: 6px;
      z-index: 200;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .snooze-menu.open { display: block; }

    .snooze-input {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2e2e3a;
      border-radius: 5px;
      color: #e8e8e8;
      font-size: 0.85rem;
      padding: 6px 10px;
      outline: none;
      margin-bottom: 4px;
      transition: border-color 0.15s;
    }
    .snooze-input:focus { border-color: #5b5bf8; }

    .snooze-option {
      padding: 6px 10px;
      font-size: 0.85rem;
      color: #ccc;
      border-radius: 5px;
      cursor: pointer;
      user-select: none;
    }
    .snooze-option:hover  { background: #252535; color: #fff; }
    .snooze-option.active { background: #252535; color: #fff; }

    /* snoozed items in search */
    li.snoozed { opacity: 0.55; }
    li.snoozed .item-text { color: #aaa; }
    li.snoozed.selected { opacity: 0.8; border-color: #9c7cf8; }

    .snooze-badge {
      font-size: 0.7rem;
      color: #555;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .empty { color: #666; font-size: 0.9rem; padding: 20px 0; }

    .hints {
      flex-shrink: 0;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      color: #555;
      font-size: 0.7rem;
      padding: 10px 0 14px;
      width: 100%;
      max-width: 100%;
    }
    /* ── Inline PR items ───────────────────────────── */
    .item-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .item-top-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pr-kind-badge {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 1px 5px;
      border-radius: 4px;
      background: #1e1e3a;
      color: #5b5bf8;
      flex-shrink: 0;
    }

    .pr-meta {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pr-meta-repo {
      font-size: 0.72rem;
      color: #555;
    }

    li.pr-item { cursor: default; }
    li.pr-item .item-top-row { cursor: pointer; }

    .pr-badge {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 8px;
      letter-spacing: 0.02em;
    }
    .pr-badge.authored          { background: #1a2e1a; color: #4caf50; }
    .pr-badge.review-requested  { background: #2a1e10; color: #e8a44a; }
    .pr-badge.draft             { background: #1e1e2e; color: #555; }

    li.linear-item { cursor: default; }
    li.linear-item .item-top-row { cursor: pointer; }
    .linear-kind-badge {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 1px 5px;
      border-radius: 4px;
      background: #15222f;
      color: #6ec1ff;
      flex-shrink: 0;
    }
    .linear-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .linear-meta-text {
      font-size: 0.72rem;
      color: #5d7387;
    }
    .linear-subtitle {
      font-size: 0.78rem;
      color: #7d8692;
      line-height: 1.35;
    }
    .linear-pill {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 8px;
      letter-spacing: 0.02em;
      background: #17212b;
      color: #89c6ff;
    }

    .focus-badge {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4caf50;
      background: #0d1f0d;
      border: 1px solid #2a4a2a;
      border-radius: 6px;
      padding: 4px 10px;
      display: none;
      pointer-events: none;
    }
    .focus-badge.active { display: block; }

    .refresh-badge {
      position: fixed;
      top: 12px;
      right: 12px;
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #89c6ff;
      background: rgba(13, 27, 39, 0.95);
      border: 1px solid #25445d;
      border-radius: 8px;
      padding: 6px 10px;
      pointer-events: none;
      box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    }
    .refresh-badge.active { display: inline-flex; }

    .refresh-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(137, 198, 255, 0.25);
      border-top-color: #89c6ff;
      border-radius: 50%;
      animation: refresh-spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes refresh-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .settings-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      background: none;
      border: 1px solid #2e2e3a;
      border-radius: 6px;
      color: #444;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 5px 7px;
      transition: color 0.1s, border-color 0.1s;
    }
    .settings-btn:hover { color: #aaa; border-color: #555; }

    .hints kbd {
      background: #1c1c24;
      border: 1px solid #333340;
      border-radius: 4px;
      color: #666;
      font-family: inherit;
      font-size: 0.68rem;
      padding: 1px 5px;
    }
  </style>
</head>
<body>
  <button class="settings-btn" onclick="invoke('open_settings')" title="Settings (⌘,)">⚙</button>
  <div class="focus-badge" id="focus-badge">Focus mode</div>
  <div class="refresh-badge" id="refresh-badge">
    <span class="refresh-spinner"></span>
    <span>Refreshing</span>
  </div>

  <!-- New-item dialog -->
  <div class="dialog-overlay" id="new-dialog">
    <div class="dialog-box">
      <input type="text" id="new-item-input" placeholder="New item…" autocomplete="off" />
      <div class="dialog-actions">
        <button class="dialog-cancel" id="dialog-cancel-btn">Cancel</button>
        <button class="dialog-add" id="dialog-add-btn">Add</button>
      </div>
    </div>
  </div>

  <!-- Snooze menu -->
  <div class="snooze-menu" id="snooze-menu">
    <input type="text" id="snooze-input" class="snooze-input" placeholder="4h · 1d · 1w · 2h 3d…" autocomplete="off" />
    <div id="snooze-options">
      <div class="snooze-option" data-idx="0">4 hours</div>
      <div class="snooze-option" data-idx="1">1 day</div>
      <div class="snooze-option" data-idx="2">1 week</div>
    </div>
  </div>

  <div id="app">
    <div class="search-bar" id="search-bar">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Search…" />
      <span class="search-mode" id="search-mode"></span>
    </div>

    <p id="error-banner" style="display:none;flex-shrink:0;color:#e05555;font-size:0.8rem;max-width:520px;width:100%;margin-bottom:8px;word-break:break-all;"></p>

    <div class="list-wrapper">
      <ul id="list"></ul>
      <p class="empty" id="empty">No items yet.</p>
    </div>

    <div class="hints">
      <span><kbd>N</kbd> new item</span>
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate · <kbd>⌥↑</kbd><kbd>⌥↓</kbd> reorder</span>
      <span><kbd>E</kbd> edit</span>
      <span><kbd>Space</kbd> toggle done</span>
      <span><kbd>S</kbd> snooze</span>
      <span><kbd>⌫</kbd> close</span>
      <span><kbd>⌘F</kbd> search</span>
      <span><kbd>⌘⇧F</kbd> search all</span>
      <span><kbd>⌘R</kbd> refresh</span>
      <span><kbd>⇧F</kbd> focus mode</span>
      <span><kbd>⇧S</kbd> settings</span>
    </div>
  </div>

  <script>
    // Lazy access so the global is resolved at call time, not script parse time
    function invoke(cmd, args) {
      const fn = window.__TAURI__?.core?.invoke;
      if (!fn) throw new Error('window.__TAURI__.core.invoke not available');
      return fn(cmd, args);
    }

    // ── PR sync ────────────────────────────────────────────────────────
    async function syncExternalItems() {
      setRefreshing(true);
      try {
        await Promise.all([
          invoke('sync_pull_requests'),
          invoke('sync_linear_items'),
        ]);
        await load();
      } catch (e) {
        console.error(e);
      } finally {
        setRefreshing(false);
      }
    }

    function showError(e) {
      const msg = e?.message ?? String(e);
      console.error('[avidhd]', msg, e);
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.style.display = 'block';
    }

    let items      = [];    // [{ id, text, position, status, snoozed_until }]
    let selected   = null;  // index into items[]
    let searchOpen = false;
    let searchAll  = false;
    let searchQuery = '';
    let dragSrc    = null;
    let refreshDepth = 0;

    function setRefreshing(active) {
      refreshDepth = Math.max(0, refreshDepth + (active ? 1 : -1));
      document.getElementById('refresh-badge').classList.toggle('active', refreshDepth > 0);
    }

    // ── Snooze menu state ─────────────────────────────────────────────
    const SNOOZE_PRESETS = [
      { label: '4 hours', secs: 4 * 3600 },
      { label: '1 day',   secs: 86400 },
      { label: '1 week',  secs: 7 * 86400 },
    ];
    let snoozeOpen    = false;
    let snoozeItemIdx = null;

    // ── Focus mode ────────────────────────────────────────────────────
    let focusMode  = false;
    let focusLimit = parseInt(localStorage.getItem('focusLimit') ?? '5', 10) || 5;
    window.addEventListener('storage', e => {
      if (e.key === 'focusLimit') {
        focusLimit = parseInt(e.newValue ?? '5', 10) || 5;
        if (focusMode) render();
      }
    });

    function toggleFocus() {
      focusMode = !focusMode;
      document.getElementById('focus-badge').classList.toggle('active', focusMode);
      if (selected !== null && focusMode && selected >= focusLimit) selected = focusLimit - 1;
      render();
    }
    let snoozeOptIdx  = 0; // -1 = no preset highlighted (custom duration)

    function parseSnoozeDuration(str) {
      let total = 0;
      for (const tok of str.trim().toLowerCase().split(/[\s,]+/)) {
        const m = tok.match(/^(\d+(?:\.\d+)?)(h|d|w)$/);
        if (!m) continue;
        const n = parseFloat(m[1]);
        if (m[2] === 'h') total += n * 3600;
        else if (m[2] === 'd') total += n * 86400;
        else if (m[2] === 'w') total += n * 7 * 86400;
      }
      return total;
    }

    // Return the best matching preset index for the typed text, or -1 for custom.
    function matchSnoozePreset(text) {
      if (!text.trim()) return 0; // empty → default to first preset
      const lower = text.toLowerCase().trim();
      const secs  = parseSnoozeDuration(text);
      // exact duration match
      if (secs > 0) {
        const exact = SNOOZE_PRESETS.findIndex(p => p.secs === secs);
        if (exact !== -1) return exact;
        return -1; // valid custom duration, no preset match
      }
      // label substring match
      const label = SNOOZE_PRESETS.findIndex(p => p.label.toLowerCase().includes(lower));
      return label; // -1 if no match (invalid text)
    }

    function formatSnoozeUntil(ts) {
      const diff = ts - Math.floor(Date.now() / 1000);
      if (diff <= 0) return null;
      const h = Math.floor(diff / 3600);
      const d = Math.floor(diff / 86400);
      if (d >= 1) {
        const rem = Math.floor((diff - d * 86400) / 3600);
        return rem > 0 ? `${d}d ${rem}h` : `${d}d`;
      }
      const m = Math.floor((diff % 3600) / 60);
      return m > 0 ? `${h}h ${m}m` : `${h}h`;
    }

    function renderSnoozeMenu() {
      document.querySelectorAll('.snooze-option').forEach((el, i) => {
        el.classList.toggle('active', i === snoozeOptIdx);
      });
    }

    function openSnoozeMenu(itemIdx) {
      const li = document.querySelector(`li[data-index="${itemIdx}"]`);
      if (!li) return;
      snoozeOpen    = true;
      snoozeItemIdx = itemIdx;
      snoozeOptIdx  = 0;
      const menu  = document.getElementById('snooze-menu');
      const input = document.getElementById('snooze-input');
      input.value = '';
      renderSnoozeMenu();
      const rect = li.getBoundingClientRect();
      menu.classList.add('open');
      menu.style.top  = (rect.bottom + 6) + 'px';
      menu.style.left = rect.left + 'px';
      requestAnimationFrame(() => {
        const mr = menu.getBoundingClientRect();
        if (mr.right > window.innerWidth - 8)
          menu.style.left = (window.innerWidth - mr.width - 8) + 'px';
        if (mr.bottom > window.innerHeight - 8)
          menu.style.top = (rect.top - mr.height - 6) + 'px';
        input.focus();
      });
    }

    function closeSnoozeMenu() {
      snoozeOpen    = false;
      snoozeItemIdx = null;
      document.getElementById('snooze-menu').classList.remove('open');
    }

    async function snoozeMenuConfirm() {
      const text = document.getElementById('snooze-input').value.trim();
      let secs;
      if (text === '' || snoozeOptIdx >= 0) {
        // use highlighted preset
        secs = SNOOZE_PRESETS[Math.max(0, snoozeOptIdx)].secs;
      } else {
        // custom duration
        secs = parseSnoozeDuration(text);
      }
      if (secs > 0) await applySnooze(snoozeItemIdx, secs);
    }

    async function applySnooze(itemIdx, secs) {
      const item  = items[itemIdx];
      const until = Math.floor(Date.now() / 1000) + secs;
      closeSnoozeMenu();
      try {
        await invoke('snooze_item', { id: item.id, until });
        pushUndo({ type: 'snooze', id: item.id });
        await load();
        selected = items.length ? Math.min(itemIdx, items.length - 1) : null;
        render();
        focusSelected();
      } catch (e) {
        showError(e);
      }
    }

    // Snooze input: filter presets as you type, arrow keys to navigate
    document.getElementById('snooze-input').addEventListener('input', e => {
      snoozeOptIdx = matchSnoozePreset(e.target.value);
      renderSnoozeMenu();
    });

    document.getElementById('snooze-input').addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); snoozeMenuConfirm(); return; }
      if (e.key === 'Escape') { e.preventDefault(); closeSnoozeMenu(); return; }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        snoozeOptIdx = Math.min(SNOOZE_PRESETS.length - 1, snoozeOptIdx + 1);
        renderSnoozeMenu();
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        snoozeOptIdx = Math.max(0, snoozeOptIdx - 1);
        renderSnoozeMenu();
      }
    });

    // Preset clicks
    document.querySelectorAll('.snooze-option').forEach(el => {
      el.addEventListener('mouseenter', () => {
        snoozeOptIdx = parseInt(el.dataset.idx);
        renderSnoozeMenu();
      });
      el.addEventListener('click', () => {
        snoozeOptIdx = parseInt(el.dataset.idx);
        snoozeMenuConfirm();
      });
    });

    // Close when clicking outside
    document.addEventListener('mousedown', e => {
      if (snoozeOpen && !document.getElementById('snooze-menu').contains(e.target))
        closeSnoozeMenu();
    });

    // ── Data ──────────────────────────────────────────────────────────
    async function load() {
      try {
        items = await invoke('get_items', {
          includeDone: searchAll,
          includeSnoozed: searchOpen,
          query: searchQuery,
        });
        render();
      } catch (e) {
        showError(e);
      }
    }

    // ── New-item dialog ───────────────────────────────────────────────
    function openNewDialog() {
      const overlay = document.getElementById('new-dialog');
      const input   = document.getElementById('new-item-input');
      overlay.classList.add('open');
      input.value = '';
      input.focus();
    }

    function closeNewDialog() {
      document.getElementById('new-dialog').classList.remove('open');
    }

    document.getElementById('new-item-input').addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); submitNewItem(); }
      if (e.key === 'Escape') { closeNewDialog(); }
    });

    document.getElementById('dialog-add-btn').addEventListener('click', submitNewItem);
    document.getElementById('dialog-cancel-btn').addEventListener('click', closeNewDialog);

    document.getElementById('new-dialog').addEventListener('mousedown', e => {
      if (e.target === e.currentTarget) closeNewDialog();
    });

    async function submitNewItem() {
      const input = document.getElementById('new-item-input');
      const text  = input.value.trim();
      if (!text) return;
      try {
        const newItem = await invoke('add_item', { text });
        pushUndo({ type: 'add', id: newItem.id });
        closeNewDialog();
        await load();
        const openItems = items.filter(i => i.status === 'open');
        if (openItems.length) {
          const idx = items.indexOf(openItems[openItems.length - 1]);
          selectItem(idx);
        }
      } catch (e) {
        showError(e);
      }
    }

    // ── Search ────────────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value;
      load();
    });

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Escape') closeSearch();
      if (e.key === 'ArrowDown') { e.preventDefault(); if (items.length) selectItem(selected ?? 0); }
    });

    function openSearch(all) {
      searchOpen = true;
      searchAll  = all;
      searchQuery = '';
      const bar   = document.getElementById('search-bar');
      const mode  = document.getElementById('search-mode');
      const input = document.getElementById('search-input');
      bar.classList.add('active');
      mode.textContent = all ? 'All' : 'Open';
      mode.className   = 'search-mode ' + (all ? 'all' : 'open');
      input.value = '';
      load().then(() => input.focus());
    }

    function closeSearch() {
      searchOpen  = false;
      searchAll   = false;
      searchQuery = '';
      document.getElementById('search-bar').classList.remove('active');
      document.getElementById('search-input').value = '';
      load();
    }

    // ── Undo stack ─────────────────────────────────────────────────────
    const undoStack = [];

    function pushUndo(action) {
      undoStack.push(action);
      if (undoStack.length > 50) undoStack.shift();
    }

    async function undo() {
      const action = undoStack.pop();
      if (!action) return;
      try {
        switch (action.type) {
          case 'close':    await invoke('reopen_item',   { id: action.id }); break;
          case 'reopen':   await invoke('close_item',    { id: action.id }); break;
          case 'snooze':   await invoke('unsnooze_item', { id: action.id }); break;
          case 'unsnooze': await invoke('snooze_item',   { id: action.id, until: action.until }); break;
          case 'add':      await invoke('delete_item',   { id: action.id }); break;
          case 'edit':     await invoke('update_item',   { id: action.id, text: action.oldText }); break;
          case 'reorder':  await invoke('reorder_items', { ids: action.ids }); break;
        }
        await load();
      } catch (e) { showError(e); }
    }

    // ── Mutations ─────────────────────────────────────────────────────
    async function moveItem(index, dir) {
      const target = index + dir;
      // only move among open items
      if (target < 0 || target >= items.length) return;
      if (items[target].status !== 'open') return;
      const prevIds = items.filter(i => i.status === 'open').map(i => i.id);
      [items[index], items[target]] = [items[target], items[index]];
      selected = target;
      render();
      await invoke('reorder_items', { ids: items.filter(i => i.status === 'open').map(i => i.id) });
      pushUndo({ type: 'reorder', ids: prevIds });
    }

    async function closeItem(index) {
      try {
        const item = items[index];
        if (item.status === 'open') {
          await invoke('close_item', { id: item.id });
          pushUndo({ type: 'close', id: item.id });
        } else {
          await invoke('delete_item', { id: item.id });
          // permanent delete — not undoable
        }
        await load();
        selected = items.length === 0 ? null : Math.min(index, items.length - 1);
        render();
        focusSelected();
      } catch (e) {
        showError(e);
      }
    }

    async function toggleStatus(index) {
      try {
        const item = items[index];
        if (item.status === 'open') {
          await invoke('close_item', { id: item.id });
          pushUndo({ type: 'close', id: item.id });
        } else {
          await invoke('reopen_item', { id: item.id });
          pushUndo({ type: 'reopen', id: item.id });
        }
        await load();
        const newIdx = items.findIndex(i => i.id === item.id);
        selected = newIdx !== -1 ? newIdx : Math.min(index, items.length - 1);
        render();
        focusSelected();
      } catch (e) {
        showError(e);
      }
    }

    function startEdit(index) {
      if (items[index].status !== 'open') return;
      selected = index;
      render(index);
      const inp = document.querySelector('.item-edit');
      if (inp) { inp.focus(); inp.select(); }
    }

    async function commitEdit(index, inp) {
      const val = inp.value.trim();
      if (val && val !== items[index].text) {
        const oldText = items[index].text;
        items[index].text = val;
        await invoke('update_item', { id: items[index].id, text: val });
        pushUndo({ type: 'edit', id: items[index].id, oldText });
      }
      render();
      focusSelected();
    }

    // ── Selection ─────────────────────────────────────────────────────
    function selectItem(index) {
      selected = index;
      render();
      focusSelected();
    }

    function focusSelected() {
      if (selected === null) return;
      const li = document.querySelector(`li[data-index="${selected}"]`);
      if (!li) return;
      li.focus();
      li.scrollIntoView({ block: 'nearest' });
    }

    // ── Global keyboard shortcuts ─────────────────────────────────────
    document.addEventListener('keydown', e => {
      const active   = document.activeElement;
      const inSearch = active.id === 'search-input';
      const inDialog = active.id === 'new-item-input';
      const inSnooze = active.id === 'snooze-input';
      const inEdit   = active.classList && active.classList.contains('item-edit');

      if (inEdit || inDialog || inSnooze) return;

      // Cmd+Z — undo
      if (e.metaKey && !e.shiftKey && e.key === 'z') {
        e.preventDefault();
        undo();
        return;
      }

      // Cmd+Shift+F — search all
      if (e.metaKey && e.shiftKey && (e.key === 'f' || e.key === 'F')) {
        e.preventDefault();
        openSearch(true);
        return;
      }
      // Cmd+F — search open
      if (e.metaKey && !e.shiftKey && (e.key === 'f' || e.key === 'F')) {
        e.preventDefault();
        openSearch(false);
        return;
      }
      // Cmd+R — refresh external items
      if (e.metaKey && !e.shiftKey && (e.key === 'r' || e.key === 'R')) {
        e.preventDefault();
        syncExternalItems();
        return;
      }

      if (inSearch) return;

      switch (e.key) {
        case 'F':
          if (e.shiftKey) { e.preventDefault(); toggleFocus(); }
          break;

        case 'S':
          if (e.shiftKey) { e.preventDefault(); invoke('open_settings').catch(console.error); }
          break;

        case 'n': case 'N':
          e.preventDefault();
          openNewDialog();
          break;

        case 'ArrowDown':
          e.preventDefault();
          if (!items.length) return;
          if (e.altKey) { if (selected !== null) moveItem(selected, 1); }
          else {
            const max = focusMode ? Math.min(focusLimit, items.filter(x => x.status === 'open').length) - 1 : items.length - 1;
            selectItem(selected === null ? 0 : Math.min(selected + 1, max));
          }
          break;

        case 'ArrowUp':
          e.preventDefault();
          if (e.altKey) { if (selected !== null) moveItem(selected, -1); }
          else if (selected !== null && selected > 0) selectItem(selected - 1);
          break;

        case 'Enter':
          e.preventDefault();
          if (selected !== null) {
            const item = items[selected];
            const url = item.kind === 'pr'
              ? item.pr_url
              : (item.kind === 'linear_notification' || item.kind === 'linear_issue')
                ? item.linear_url
                : null;
            if (url) invoke('open_url', { url }).catch(console.error);
          }
          break;

        case 'Backspace': case 'Delete':
          e.preventDefault();
          if (selected !== null) closeItem(selected);
          break;

        case ' ':
          e.preventDefault();
          if (selected !== null) toggleStatus(selected);
          break;

        case 'e': case 'E':
          e.preventDefault();
          if (selected !== null) startEdit(selected);
          break;

        case 's': case 'S':
          e.preventDefault();
          if (selected !== null) {
            const item = items[selected];
            if (item.status !== 'open') break;
            const isSnoozed = item.snoozed_until &&
              item.snoozed_until > Math.floor(Date.now() / 1000);
            if (isSnoozed) {
              // already snoozed → unsnooze immediately
              const savedUntil = item.snoozed_until;
              invoke('unsnooze_item', { id: item.id })
                .then(() => { pushUndo({ type: 'unsnooze', id: item.id, until: savedUntil }); return load(); })
                .catch(showError);
            } else {
              openSnoozeMenu(selected);
            }
          }
          break;

        case 'Escape':
          if (searchOpen) closeSearch();
          break;
      }
    });

    // ── Render ────────────────────────────────────────────────────────
    function render(editingIndex = null) {
      const list  = document.getElementById('list');
      const empty = document.getElementById('empty');

      const visibleItems = items.filter(i => i.status === 'open' || searchAll);
      empty.style.display = visibleItems.length ? 'none' : '';
      list.innerHTML = '';

      let shownDivider = false;
      let openShown = 0;

      items.forEach((item, i) => {
        const isDone = item.status === 'done';

        // focus mode: hide open items beyond the limit (done items always hidden in focus mode)
        if (focusMode) {
          if (isDone) return;
          if (openShown >= focusLimit) return;
          openShown++;
        }

        // divider between open and done
        if (isDone && !shownDivider && searchAll) {
          shownDivider = true;
          const div = document.createElement('li');
          div.className = 'section-divider';
          div.textContent = 'Done';
          list.appendChild(div);
        }

        const now = Math.floor(Date.now() / 1000);
        const isSnoozed = !isDone && item.snoozed_until && item.snoozed_until > now;
        const isPR = item.kind === 'pr';
        const isLinearNotification = item.kind === 'linear_notification';
        const isLinearIssue = item.kind === 'linear_issue';
        const isLinear = isLinearNotification || isLinearIssue;

        const li = document.createElement('li');
        li.dataset.index = i;
        li.tabIndex = 0;
        if (isDone) li.classList.add('done');
        if (isSnoozed) li.classList.add('snoozed');
        if (isPR) li.classList.add('pr-item');
        if (isLinear) li.classList.add('linear-item');
        if (i === selected) li.classList.add('selected');

        const openRank = items.slice(0, i + 1).filter(x => x.status === 'open').length;

        const snoozeLabel = isSnoozed ? formatSnoozeUntil(item.snoozed_until) : null;
        const snoozeBadge = snoozeLabel
          ? `<span class="snooze-badge" title="Snoozed">💤 ${snoozeLabel}</span>`
          : '';

        const removeTitle = isDone ? 'Delete permanently' : 'Mark done';

        let innerContent;
        if (isPR) {
          const roleClass  = item.pr_role === 'authored' ? 'authored' : 'review-requested';
          const roleLabel  = item.pr_role === 'authored' ? 'Opened' : 'Review requested';
          const draftBadge = item.pr_draft ? '<span class="pr-badge draft">Draft</span>' : '';
          const textNode   = (!isDone && editingIndex === i)
            ? `<input class="item-edit" value="${escHtml(item.text)}" />`
            : `<span class="item-text">${escHtml(item.text)}</span>`;
          innerContent = `
            <div class="item-body">
              <div class="item-top-row">
                <span class="pr-kind-badge">PR</span>
                ${textNode}
                ${snoozeBadge}
              </div>
              <div class="pr-meta">
                <span class="pr-meta-repo">${escHtml(item.pr_repo ?? '')} #${item.pr_number ?? ''}</span>
                <span class="pr-badge ${roleClass}">${roleLabel}</span>
                ${draftBadge}
              </div>
            </div>`;
        } else if (isLinear) {
          const textNode = (!isDone && editingIndex === i)
            ? `<input class="item-edit" value="${escHtml(item.text)}" />`
            : `<span class="item-text">${escHtml(item.text)}</span>`;
          const subtitle = item.linear_subtitle
            ? `<div class="linear-subtitle">${escHtml(item.linear_subtitle)}</div>`
            : '';
          const idMeta = item.linear_identifier
            ? `<span class="linear-meta-text">${escHtml(item.linear_identifier)}</span>`
            : '';
          const stateMeta = item.linear_state
            ? `<span class="linear-pill">${escHtml(item.linear_state)}</span>`
            : '';
          const modeMeta = isLinearNotification
            ? '<span class="linear-pill">Inbox</span>'
            : '<span class="linear-pill">Assigned</span>';
          innerContent = `
            <div class="item-body">
              <div class="item-top-row">
                <span class="linear-kind-badge">Linear</span>
                ${textNode}
                ${snoozeBadge}
              </div>
              <div class="linear-meta">
                ${idMeta}
                ${stateMeta}
                ${modeMeta}
              </div>
              ${subtitle}
            </div>`;
        } else {
          const textNode = (!isDone && editingIndex === i)
            ? `<input class="item-edit" value="${escHtml(item.text)}" />`
            : `<span class="item-text">${escHtml(item.text)}</span>`;
          innerContent = `${textNode}${snoozeBadge}`;
        }

        li.innerHTML = `
          <span class="drag-handle">⠿</span>
          <span class="rank">${isDone ? '✓' : openRank}</span>
          ${innerContent}
          <div class="move-btns">
            <button class="move" tabindex="-1" ${(isDone || i === 0 || items[i-1]?.status !== 'open') ? 'disabled' : ''}>▲</button>
            <button class="move" tabindex="-1" ${(isDone || i === items.length - 1 || items[i+1]?.status !== 'open') ? 'disabled' : ''}>▼</button>
          </div>
          <button class="remove" tabindex="-1" title="${removeTitle}">✕</button>
        `;

        // clicking PR title opens URL
        if (isPR && item.pr_url) {
          li.querySelector('.item-top-row')?.addEventListener('click', ev => {
            if (!ev.target.closest('.item-edit'))
              invoke('open_url', { url: item.pr_url }).catch(console.error);
          });
        }
        if (isLinear && item.linear_url) {
          li.querySelector('.item-top-row')?.addEventListener('click', ev => {
            if (!ev.target.closest('.item-edit'))
              invoke('open_url', { url: item.linear_url }).catch(console.error);
          });
        }

        if (!isDone) {
          const [upBtn, downBtn] = li.querySelectorAll('.move');
          upBtn.addEventListener('click',   ev => { ev.stopPropagation(); moveItem(i, -1); });
          downBtn.addEventListener('click', ev => { ev.stopPropagation(); moveItem(i,  1); });

          if (!isDone) {
            li.draggable = true;
            li.addEventListener('dragstart', ev => {
              dragSrc = i;
              li.classList.add('dragging');
              ev.dataTransfer.effectAllowed = 'move';
            });
            li.addEventListener('dragend', () => {
              li.classList.remove('dragging');
              document.querySelectorAll('li').forEach(el => el.classList.remove('drag-over'));
            });
            li.addEventListener('dragover', ev => {
              if (isDone) return;
              ev.preventDefault();
              ev.dataTransfer.dropEffect = 'move';
              document.querySelectorAll('li').forEach(el => el.classList.remove('drag-over'));
              li.classList.add('drag-over');
            });
            li.addEventListener('drop', async ev => {
              ev.preventDefault();
              const target = parseInt(li.dataset.index);
              if (dragSrc === null || dragSrc === target) return;
              if (items[dragSrc].status !== 'open' || items[target].status !== 'open') return;
              const prevIds = items.filter(x => x.status === 'open').map(x => x.id);
              const [moved] = items.splice(dragSrc, 1);
              items.splice(target, 0, moved);
              selected = target;
              dragSrc = null;
              render();
              await invoke('reorder_items', { ids: items.filter(x => x.status === 'open').map(x => x.id) });
              pushUndo({ type: 'reorder', ids: prevIds });
            });
          }
        }

        li.querySelector('.remove').addEventListener('click', ev => {
          ev.stopPropagation();
          closeItem(i);
        });

        li.addEventListener('mousedown', () => { selected = i; });
        li.addEventListener('focus',     () => { selected = i; render(); });

        if (!isDone && editingIndex === i) {
          const inp = li.querySelector('.item-edit');
          inp.addEventListener('keydown', ev => {
            if (ev.key === 'Enter')  { ev.preventDefault(); commitEdit(i, inp); }
            if (ev.key === 'Escape') { render(); focusSelected(); }
          });
          inp.addEventListener('blur', () => commitEdit(i, inp));
        }

        list.appendChild(li);
      });
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load().then(() => { syncExternalItems(); });
    setInterval(syncExternalItems, 60_000);
  </script>
</body>
</html>
