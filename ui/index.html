<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>avidhd</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e8e8e8;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 24px 0;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #aaa;
      margin-bottom: 28px;
    }

    /* ── New-item dialog ────────────────────────────────── */
    .dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .dialog-overlay.open { display: flex; }

    .dialog-box {
      background: #1c1c24;
      border: 1px solid #2e2e3a;
      border-radius: 10px;
      padding: 20px 20px 16px;
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dialog-box input {
      background: #0f0f13;
      border: 1px solid #2e2e3a;
      border-radius: 7px;
      color: #e8e8e8;
      font-size: 0.95rem;
      outline: none;
      padding: 10px 12px;
      transition: border-color 0.15s;
      width: 100%;
    }
    .dialog-box input:focus { border-color: #5b5bf8; }

    .dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    button.dialog-cancel {
      background: none;
      border: 1px solid #2e2e3a;
      border-radius: 6px;
      color: #666;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 7px 14px;
      transition: color 0.1s, border-color 0.1s;
    }
    button.dialog-cancel:hover { color: #aaa; border-color: #555; }

    button.dialog-add {
      background: #5b5bf8;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 7px 16px;
      transition: background 0.15s;
    }
    button.dialog-add:hover { background: #4a4ae0; }

    /* ── Search bar ─────────────────────────────────────── */
    .search-bar {
      display: none;
      flex-shrink: 0;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 100%;
      margin-bottom: 10px;
      background: #1c1c24;
      border: 1px solid #5b5bf8;
      border-radius: 8px;
      padding: 8px 12px;
    }

    .search-bar.active { display: flex; }

    .search-icon { color: #5b5bf8; font-size: 0.85rem; flex-shrink: 0; }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: #e8e8e8;
      font-size: 0.95rem;
      outline: none;
    }

    .search-mode {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 10px;
      flex-shrink: 0;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .search-mode.open { background: #1e3a1e; color: #4caf50; }
    .search-mode.all  { background: #2a1e3a; color: #9c7cf8; }

    .search-hint {
      font-size: 0.7rem;
      color: #333;
      margin-bottom: 14px;
      width: 100%;
      max-width: 100%;
    }

    /* ── List wrapper (scrollable fill) ────────────────── */
    .list-wrapper {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      width: 100%;
      max-width: 100%;
      scrollbar-width: thin;
      scrollbar-color: #252535 transparent;
    }

    /* ── List ───────────────────────────────────────────── */
    ul {
      list-style: none;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px 0 12px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0d0d14;
      border: 1px solid #252535;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: grab;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s;
      user-select: none;
      outline: none;
    }

    li.selected { background: #1e1e30; border-color: #5b5bf8; }
    li.dragging  { opacity: 0.35; cursor: grabbing; }
    li.drag-over { background: #22223a; border-color: #5b5bf8; }

    /* done items */
    li.done {
      opacity: 0.45;
      cursor: default;
    }
    li.done .item-text { text-decoration: line-through; color: #888; }
    li.done .drag-handle { visibility: hidden; }
    li.done .move-btns   { visibility: hidden; }
    li.done.selected { border-color: #9c7cf8; background: #1a1a28; opacity: 0.75; }

    /* divider between open and done sections */
    li.section-divider {
      background: transparent;
      border-color: transparent;
      cursor: default;
      padding: 4px 0 2px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #333;
      text-transform: uppercase;
      gap: 0;
    }
    li.section-divider:hover { background: transparent; }

    .drag-handle { color: #333; font-size: 0.85rem; cursor: grab; padding: 0 2px; }
    li:hover:not(.done):not(.section-divider) .drag-handle { color: #555; }
    li.selected:not(.done) .drag-handle { color: #555; }

    .rank { font-size: 0.75rem; color: #555; min-width: 20px; text-align: right; }
    li.done .rank { color: #333; }

    .item-text { flex: 1; font-size: 0.95rem; color: #ffffff; font-weight: 500; }

    .item-edit {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid #5b5bf8;
      border-radius: 0;
      color: #e8e8e8;
      font-size: 0.95rem;
      outline: none;
      padding: 0 2px;
    }

    .move-btns { display: flex; flex-direction: column; gap: 2px; }

    button.move {
      background: none;
      border: 1px solid #2e2e3a;
      border-radius: 5px;
      color: #888;
      cursor: pointer;
      font-size: 0.65rem;
      line-height: 1;
      padding: 3px 6px;
      transition: color 0.1s, border-color 0.1s;
    }

    button.move:hover { color: #e8e8e8; border-color: #555; }
    button.move:disabled { opacity: 0.2; cursor: default; }

    button.remove {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 4px;
      transition: color 0.1s;
    }
    button.remove:hover { color: #e05555; }

    .pr-card.pr-selected { border-color: #5b5bf8; background: #13131e; }

    /* ── Snooze menu ────────────────────────────────── */
    .snooze-menu {
      display: none;
      position: fixed;
      background: #1c1c24;
      border: 1px solid #2e2e3a;
      border-radius: 8px;
      padding: 4px;
      z-index: 200;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .snooze-menu.open { display: block; }

    .snooze-option {
      padding: 7px 12px;
      font-size: 0.85rem;
      color: #ccc;
      border-radius: 5px;
      cursor: pointer;
      user-select: none;
    }
    .snooze-option:hover  { background: #252535; color: #fff; }
    .snooze-option.active { background: #252535; color: #fff; }

    .snooze-custom-row {
      padding: 4px 8px 6px;
    }
    .snooze-custom-row input {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2e2e3a;
      border-radius: 5px;
      color: #e8e8e8;
      font-size: 0.82rem;
      padding: 5px 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .snooze-custom-row input:focus { border-color: #5b5bf8; }

    /* snoozed items in search */
    li.snoozed { opacity: 0.55; }
    li.snoozed .item-text { color: #aaa; }
    li.snoozed.selected { opacity: 0.8; border-color: #9c7cf8; }

    .snooze-badge {
      font-size: 0.7rem;
      color: #555;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .empty { color: #666; font-size: 0.9rem; padding: 20px 0; }

    .hints {
      flex-shrink: 0;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-start;
      color: #555;
      font-size: 0.7rem;
      padding: 10px 0 14px;
      width: 100%;
      max-width: 100%;
    }
    /* ── PR strip ──────────────────────────────── */
    .pr-section {
      display: none;
      flex-shrink: 0;
      width: 100%;
      max-width: 100%;
      margin-bottom: 16px;
    }

    .pr-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .pr-section-title {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      flex: 1;
    }

    .pr-count {
      font-size: 0.68rem;
      background: #1c1c28;
      color: #666;
      border-radius: 8px;
      padding: 1px 7px;
    }

    .pr-refresh {
      background: none;
      border: none;
      color: #333;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0 2px;
      transition: color 0.1s;
      line-height: 1;
    }
    .pr-refresh:hover { color: #aaa; }
    .pr-refresh.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pr-cards {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
      scrollbar-color: #252535 transparent;
    }

    .pr-card {
      flex-shrink: 0;
      width: 210px;
      background: #0d0d14;
      border: 1px solid #252535;
      border-radius: 8px;
      padding: 9px 11px;
      cursor: pointer;
      transition: border-color 0.15s;
      text-align: left;
    }
    .pr-card:hover { border-color: #5b5bf8; }

    .pr-card-repo {
      font-size: 0.68rem;
      color: #555;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pr-card-title {
      font-size: 0.82rem;
      color: #e8e8e8;
      font-weight: 500;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .pr-card-meta {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .pr-badge {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 8px;
      letter-spacing: 0.02em;
    }
    .pr-badge.authored          { background: #1a2e1a; color: #4caf50; }
    .pr-badge.review-requested  { background: #2a1e10; color: #e8a44a; }
    .pr-badge.draft             { background: #1e1e2e; color: #555; }

    .pr-number {
      font-size: 0.68rem;
      color: #444;
    }

    .settings-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      background: none;
      border: 1px solid #2e2e3a;
      border-radius: 6px;
      color: #444;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 5px 7px;
      transition: color 0.1s, border-color 0.1s;
    }
    .settings-btn:hover { color: #aaa; border-color: #555; }

    .hints kbd {
      background: #1c1c24;
      border: 1px solid #333340;
      border-radius: 4px;
      color: #666;
      font-family: inherit;
      font-size: 0.68rem;
      padding: 1px 5px;
    }
  </style>
</head>
<body>
  <button class="settings-btn" onclick="invoke('open_settings')" title="Settings (⌘,)">⚙</button>

  <!-- PR strip -->
  <div class="pr-section" id="pr-section">
    <div class="pr-section-header">
      <span class="pr-section-title">Pull Requests</span>
      <span class="pr-count" id="pr-count">0</span>
      <button class="pr-refresh" id="pr-refresh-btn" title="Refresh" onclick="loadPRs()">↺</button>
    </div>
    <div class="pr-cards" id="pr-cards"></div>
  </div>

  <!-- New-item dialog -->
  <div class="dialog-overlay" id="new-dialog">
    <div class="dialog-box">
      <input type="text" id="new-item-input" placeholder="New item…" autocomplete="off" />
      <div class="dialog-actions">
        <button class="dialog-cancel" id="dialog-cancel-btn">Cancel</button>
        <button class="dialog-add" id="dialog-add-btn">Add</button>
      </div>
    </div>
  </div>

  <!-- Snooze menu -->
  <div class="snooze-menu" id="snooze-menu">
    <div class="snooze-option" data-idx="0">4 hours</div>
    <div class="snooze-option" data-idx="1">1 day</div>
    <div class="snooze-option" data-idx="2">1 week</div>
    <div class="snooze-option" data-idx="3">Custom…</div>
    <div class="snooze-custom-row" id="snooze-custom-row" style="display:none">
      <input type="text" id="snooze-custom-input" placeholder="e.g. 4h  2d  1w" autocomplete="off" />
    </div>
  </div>

  <div class="search-bar" id="search-bar">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Search…" />
    <span class="search-mode" id="search-mode"></span>
  </div>

  <p id="error-banner" style="display:none;flex-shrink:0;color:#e05555;font-size:0.8rem;max-width:520px;width:100%;margin-bottom:8px;word-break:break-all;"></p>

  <div class="list-wrapper">
    <ul id="list"></ul>
    <p class="empty" id="empty">No items yet.</p>
  </div>

  <div class="hints">
    <span><kbd>N</kbd> new item</span>
    <span><kbd>↑</kbd><kbd>↓</kbd> navigate · <kbd>←</kbd><kbd>→</kbd> PRs</span>
    <span><kbd>E</kbd> edit</span>
    <span><kbd>Space</kbd> toggle done</span>
    <span><kbd>S</kbd> snooze</span>
    <span><kbd>⌫</kbd> close</span>
    <span><kbd>⌘F</kbd> search</span>
    <span><kbd>⌘⇧F</kbd> search all</span>
  </div>

  <script>
    // Lazy access so the global is resolved at call time, not script parse time
    function invoke(cmd, args) {
      const fn = window.__TAURI__?.core?.invoke;
      if (!fn) throw new Error('window.__TAURI__.core.invoke not available');
      return fn(cmd, args);
    }

    // ── Pull Requests ─────────────────────────────────────────────────────
    let prRefreshTimer = null;
    let currentPRs  = [];
    let prSelected  = null;  // index into currentPRs

    async function loadPRs() {
      const btn = document.getElementById('pr-refresh-btn');
      btn.classList.add('spinning');
      try {
        const prs = await invoke('get_pull_requests');
        renderPRs(prs, null);
      } catch (e) {
        renderPRs([], String(e));
      } finally {
        btn.classList.remove('spinning');
      }
    }

    function renderPRs(prs, error) {
      const section = document.getElementById('pr-section');
      const cards   = document.getElementById('pr-cards');
      const count   = document.getElementById('pr-count');

      currentPRs = prs;
      section.style.display = 'block';
      count.textContent = prs.length;
      cards.innerHTML = '';

      if (error) {
        const msg = document.createElement('div');
        msg.style.cssText = 'font-size:0.75rem;color:#e05555;padding:6px 0;';
        msg.textContent = 'Failed to load PRs: ' + error;
        cards.appendChild(msg);
        return;
      }

      if (!prs.length) {
        const msg = document.createElement('div');
        msg.style.cssText = 'font-size:0.75rem;color:#555;padding:6px 0;';
        msg.textContent = 'No open pull requests.';
        cards.appendChild(msg);
        return;
      }

      prs.forEach((pr, idx) => {
        const card = document.createElement('button');
        card.className = 'pr-card' + (idx === prSelected ? ' pr-selected' : '');
        card.dataset.prIndex = idx;
        card.title = pr.html_url;
        card.addEventListener('click', () => {
          prSelected = idx;
          highlightPR();
          invoke('open_url', { url: pr.html_url }).catch(console.error);
        });

        const roleBadge = pr.role === 'authored'
          ? '<span class="pr-badge authored">Opened</span>'
          : '<span class="pr-badge review-requested">Review requested</span>';
        const draftBadge = pr.draft ? '<span class="pr-badge draft">Draft</span>' : '';

        card.innerHTML = `
          <div class="pr-card-repo">${escHtml(pr.repo)}</div>
          <div class="pr-card-title">${escHtml(pr.title)}</div>
          <div class="pr-card-meta">
            <span class="pr-number">#${pr.number}</span>
            ${roleBadge}${draftBadge}
          </div>
        `;
        cards.appendChild(card);
      });
    }

    function highlightPR() {
      document.querySelectorAll('.pr-card').forEach((c, i) => {
        c.classList.toggle('pr-selected', i === prSelected);
        if (i === prSelected) c.scrollIntoView({ block: 'nearest', inline: 'nearest' });
      });
    }

    function focusPRs() {
      if (!currentPRs.length) return false;
      prSelected = prSelected === null ? 0 : Math.max(0, Math.min(prSelected, currentPRs.length - 1));
      selected = null;
      highlightPR();
      return true;
    }

    function leavePRsDown() {
      prSelected = null;
      highlightPR();
      if (items.length) selectItem(0);
    }

    function startPRPolling() {
      loadPRs();
      prRefreshTimer = setInterval(loadPRs, 60_000);
    }

    function showError(e) {
      const msg = e?.message ?? String(e);
      console.error('[avidhd]', msg, e);
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.style.display = 'block';
    }

    let items      = [];    // [{ id, text, position, status, snoozed_until }]
    let selected   = null;  // index into items[]
    let searchOpen = false;
    let searchAll  = false;
    let searchQuery = '';
    let dragSrc    = null;

    // ── Snooze menu state ─────────────────────────────────────────────
    const SNOOZE_PRESETS = [
      { label: '4 hours', secs: 4 * 3600 },
      { label: '1 day',   secs: 86400 },
      { label: '1 week',  secs: 7 * 86400 },
      { label: 'Custom…', secs: null },
    ];
    let snoozeOpen      = false;
    let snoozeItemIdx   = null;
    let snoozeOptIdx    = 0;
    let snoozeCustom    = false;  // custom input visible

    function parseSnoozeDuration(str) {
      let total = 0;
      for (const tok of str.trim().toLowerCase().split(/[\s,]+/)) {
        const m = tok.match(/^(\d+(?:\.\d+)?)(h|d|w)$/);
        if (!m) continue;
        const n = parseFloat(m[1]);
        if (m[2] === 'h') total += n * 3600;
        else if (m[2] === 'd') total += n * 86400;
        else if (m[2] === 'w') total += n * 7 * 86400;
      }
      return total;
    }

    function formatSnoozeUntil(ts) {
      const diff = ts - Math.floor(Date.now() / 1000);
      if (diff <= 0) return null;
      const h = Math.floor(diff / 3600);
      const d = Math.floor(diff / 86400);
      if (d >= 1) {
        const rem = Math.floor((diff - d * 86400) / 3600);
        return rem > 0 ? `${d}d ${rem}h` : `${d}d`;
      }
      const m = Math.floor((diff % 3600) / 60);
      return m > 0 ? `${h}h ${m}m` : `${h}h`;
    }

    function openSnoozeMenu(itemIdx) {
      const li = document.querySelector(`li[data-index="${itemIdx}"]`);
      if (!li) return;
      snoozeOpen    = true;
      snoozeItemIdx = itemIdx;
      snoozeOptIdx  = 0;
      snoozeCustom  = false;
      const menu = document.getElementById('snooze-menu');
      document.getElementById('snooze-custom-row').style.display = 'none';
      document.getElementById('snooze-custom-input').value = '';
      renderSnoozeMenu();
      const rect = li.getBoundingClientRect();
      menu.classList.add('open');
      menu.style.top  = (rect.bottom + 6) + 'px';
      menu.style.left = rect.left + 'px';
      // keep on screen
      requestAnimationFrame(() => {
        const mr = menu.getBoundingClientRect();
        if (mr.right > window.innerWidth - 8)
          menu.style.left = (window.innerWidth - mr.width - 8) + 'px';
        if (mr.bottom > window.innerHeight - 8)
          menu.style.top = (rect.top - mr.height - 6) + 'px';
      });
    }

    function renderSnoozeMenu() {
      document.querySelectorAll('.snooze-option').forEach((el, i) => {
        el.classList.toggle('active', i === snoozeOptIdx);
      });
    }

    function closeSnoozeMenu() {
      snoozeOpen    = false;
      snoozeItemIdx = null;
      snoozeCustom  = false;
      document.getElementById('snooze-menu').classList.remove('open');
    }

    function snoozeMenuDown() {
      snoozeOptIdx = Math.min(SNOOZE_PRESETS.length - 1, snoozeOptIdx + 1);
      snoozeCustom = false;
      document.getElementById('snooze-custom-row').style.display = 'none';
      renderSnoozeMenu();
    }

    function snoozeMenuUp() {
      snoozeOptIdx = Math.max(0, snoozeOptIdx - 1);
      snoozeCustom = false;
      document.getElementById('snooze-custom-row').style.display = 'none';
      renderSnoozeMenu();
    }

    async function snoozeMenuConfirm() {
      const preset = SNOOZE_PRESETS[snoozeOptIdx];
      if (preset.secs === null) {
        // custom option
        if (!snoozeCustom) {
          snoozeCustom = true;
          const row = document.getElementById('snooze-custom-row');
          row.style.display = '';
          document.getElementById('snooze-custom-input').focus();
          return;
        }
        // already showing input — commit from Enter in input handler
        return;
      }
      await applySnooze(snoozeItemIdx, preset.secs);
    }

    async function applySnooze(itemIdx, secs) {
      const item = items[itemIdx];
      const until = Math.floor(Date.now() / 1000) + secs;
      closeSnoozeMenu();
      try {
        await invoke('snooze_item', { id: item.id, until });
        await load();
        // keep selection valid
        selected = items.length ? Math.min(itemIdx, items.length - 1) : null;
        render();
        focusSelected();
      } catch (e) {
        showError(e);
      }
    }

    // Snooze menu mouse clicks
    document.querySelectorAll('.snooze-option').forEach(el => {
      el.addEventListener('mouseenter', () => {
        snoozeOptIdx = parseInt(el.dataset.idx);
        snoozeCustom = false;
        document.getElementById('snooze-custom-row').style.display = 'none';
        renderSnoozeMenu();
      });
      el.addEventListener('click', () => snoozeMenuConfirm());
    });

    document.getElementById('snooze-custom-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const secs = parseSnoozeDuration(e.target.value);
        if (secs > 0) applySnooze(snoozeItemIdx, secs);
      }
      if (e.key === 'Escape') { e.stopPropagation(); closeSnoozeMenu(); }
    });

    // close snooze menu when clicking outside
    document.addEventListener('mousedown', e => {
      if (snoozeOpen && !document.getElementById('snooze-menu').contains(e.target))
        closeSnoozeMenu();
    });

    // ── Data ──────────────────────────────────────────────────────────
    async function load() {
      try {
        items = await invoke('get_items', {
          includeDone: searchAll,
          includeSnoozed: searchOpen,
          query: searchQuery,
        });
        render();
      } catch (e) {
        showError(e);
      }
    }

    // ── New-item dialog ───────────────────────────────────────────────
    function openNewDialog() {
      const overlay = document.getElementById('new-dialog');
      const input   = document.getElementById('new-item-input');
      overlay.classList.add('open');
      input.value = '';
      input.focus();
    }

    function closeNewDialog() {
      document.getElementById('new-dialog').classList.remove('open');
    }

    document.getElementById('new-item-input').addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); submitNewItem(); }
      if (e.key === 'Escape') { closeNewDialog(); }
    });

    document.getElementById('dialog-add-btn').addEventListener('click', submitNewItem);
    document.getElementById('dialog-cancel-btn').addEventListener('click', closeNewDialog);

    document.getElementById('new-dialog').addEventListener('mousedown', e => {
      if (e.target === e.currentTarget) closeNewDialog();
    });

    async function submitNewItem() {
      const input = document.getElementById('new-item-input');
      const text  = input.value.trim();
      if (!text) return;
      try {
        await invoke('add_item', { text });
        closeNewDialog();
        await load();
        const openItems = items.filter(i => i.status === 'open');
        if (openItems.length) {
          const idx = items.indexOf(openItems[openItems.length - 1]);
          selectItem(idx);
        }
      } catch (e) {
        showError(e);
      }
    }

    // ── Search ────────────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value;
      load();
    });

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Escape') closeSearch();
      if (e.key === 'ArrowDown') { e.preventDefault(); if (items.length) selectItem(selected ?? 0); }
    });

    function openSearch(all) {
      searchOpen = true;
      searchAll  = all;
      searchQuery = '';
      const bar   = document.getElementById('search-bar');
      const mode  = document.getElementById('search-mode');
      const input = document.getElementById('search-input');
      bar.classList.add('active');
      mode.textContent = all ? 'All' : 'Open';
      mode.className   = 'search-mode ' + (all ? 'all' : 'open');
      input.value = '';
      load().then(() => input.focus());
    }

    function closeSearch() {
      searchOpen  = false;
      searchAll   = false;
      searchQuery = '';
      document.getElementById('search-bar').classList.remove('active');
      document.getElementById('search-input').value = '';
      load();
    }

    // ── Mutations ─────────────────────────────────────────────────────
    async function moveItem(index, dir) {
      const target = index + dir;
      // only move among open items
      if (target < 0 || target >= items.length) return;
      if (items[target].status !== 'open') return;
      [items[index], items[target]] = [items[target], items[index]];
      selected = target;
      render();
      await invoke('reorder_items', { ids: items.filter(i => i.status === 'open').map(i => i.id) });
    }

    async function closeItem(index) {
      const item = items[index];
      if (item.status === 'open') {
        await invoke('close_item', { id: item.id });
      } else {
        await invoke('delete_item', { id: item.id });
      }
      await load();
      selected = items.length === 0 ? null : Math.min(index, items.length - 1);
      render();
      focusSelected();
    }

    async function toggleStatus(index) {
      const item = items[index];
      if (item.status === 'open') {
        await invoke('close_item', { id: item.id });
      } else {
        await invoke('reopen_item', { id: item.id });
      }
      await load();
      // keep selection on same logical item if still visible
      const newIdx = items.findIndex(i => i.id === item.id);
      selected = newIdx !== -1 ? newIdx : Math.min(index, items.length - 1);
      render();
      focusSelected();
    }

    function startEdit(index) {
      if (items[index].status !== 'open') return;
      selected = index;
      render(index);
      const inp = document.querySelector('.item-edit');
      if (inp) { inp.focus(); inp.select(); }
    }

    async function commitEdit(index, inp) {
      const val = inp.value.trim();
      if (val && val !== items[index].text) {
        items[index].text = val;
        await invoke('update_item', { id: items[index].id, text: val });
      }
      render();
      focusSelected();
    }

    // ── Selection ─────────────────────────────────────────────────────
    function selectItem(index) {
      selected = index;
      render();
      focusSelected();
    }

    function focusSelected() {
      if (selected === null) return;
      const li = document.querySelector(`li[data-index="${selected}"]`);
      if (li) li.focus();
    }

    // ── Global keyboard shortcuts ─────────────────────────────────────
    document.addEventListener('keydown', e => {
      const active   = document.activeElement;
      const inSearch = active.id === 'search-input';
      const inDialog = active.id === 'new-item-input';
      const inSnoozeCustom = active.id === 'snooze-custom-input';
      const inEdit   = active.classList && active.classList.contains('item-edit');

      if (inEdit || inDialog || inSnoozeCustom) return;

      // ── Snooze menu navigation ─────────────────────────────────────
      if (snoozeOpen) {
        switch (e.key) {
          case 'ArrowDown':  e.preventDefault(); snoozeMenuDown(); return;
          case 'ArrowUp':    e.preventDefault(); snoozeMenuUp();   return;
          case 'Enter':      e.preventDefault(); snoozeMenuConfirm(); return;
          case 'Escape':     e.preventDefault(); closeSnoozeMenu(); return;
        }
        return; // eat all other keys while menu is open
      }

      // Cmd+Shift+F — search all
      if (e.metaKey && e.shiftKey && (e.key === 'f' || e.key === 'F')) {
        e.preventDefault();
        openSearch(true);
        return;
      }
      // Cmd+F — search open
      if (e.metaKey && !e.shiftKey && (e.key === 'f' || e.key === 'F')) {
        e.preventDefault();
        openSearch(false);
        return;
      }

      if (inSearch) return;

      // ── PR region navigation ───────────────────────────────────────
      if (prSelected !== null) {
        switch (e.key) {
          case 'ArrowLeft':
            e.preventDefault();
            prSelected = Math.max(0, prSelected - 1);
            highlightPR();
            return;
          case 'ArrowRight':
            e.preventDefault();
            prSelected = Math.min(currentPRs.length - 1, prSelected + 1);
            highlightPR();
            return;
          case 'ArrowDown':
            e.preventDefault();
            leavePRsDown();
            return;
          case 'Enter':
            e.preventDefault();
            invoke('open_url', { url: currentPRs[prSelected].html_url }).catch(console.error);
            return;
          case 'Escape':
            prSelected = null;
            highlightPR();
            return;
        }
      }

      switch (e.key) {
        case 'n': case 'N':
          e.preventDefault();
          openNewDialog();
          break;

        case 'ArrowDown':
          e.preventDefault();
          if (!items.length) return;
          selectItem(selected === null ? 0 : Math.min(selected + 1, items.length - 1));
          break;

        case 'ArrowUp':
          e.preventDefault();
          if (selected === 0 || selected === null) {
            // jump to PR section if available
            if (currentPRs.length) focusPRs();
          } else {
            selectItem(Math.max(selected - 1, 0));
          }
          break;

        case 'Backspace': case 'Delete':
          e.preventDefault();
          if (selected !== null) closeItem(selected);
          break;

        case ' ':
          e.preventDefault();
          if (selected !== null) toggleStatus(selected);
          break;

        case 'e': case 'E':
          e.preventDefault();
          if (selected !== null) startEdit(selected);
          break;

        case 's': case 'S':
          e.preventDefault();
          if (selected !== null) {
            const item = items[selected];
            if (item.status !== 'open') break;
            const isSnoozed = item.snoozed_until &&
              item.snoozed_until > Math.floor(Date.now() / 1000);
            if (isSnoozed) {
              // already snoozed → unsnooze immediately
              invoke('unsnooze_item', { id: item.id })
                .then(load).catch(showError);
            } else {
              openSnoozeMenu(selected);
            }
          }
          break;

        case 'Escape':
          if (searchOpen) closeSearch();
          break;
      }
    });

    // ── Render ────────────────────────────────────────────────────────
    function render(editingIndex = null) {
      const list  = document.getElementById('list');
      const empty = document.getElementById('empty');

      const visibleItems = items.filter(i => i.status === 'open' || searchAll);
      empty.style.display = visibleItems.length ? 'none' : '';
      list.innerHTML = '';

      let shownDivider = false;

      items.forEach((item, i) => {
        const isDone = item.status === 'done';

        // divider between open and done
        if (isDone && !shownDivider && searchAll) {
          shownDivider = true;
          const div = document.createElement('li');
          div.className = 'section-divider';
          div.textContent = 'Done';
          list.appendChild(div);
        }

        const now = Math.floor(Date.now() / 1000);
        const isSnoozed = !isDone && item.snoozed_until && item.snoozed_until > now;

        const li = document.createElement('li');
        li.dataset.index = i;
        li.tabIndex = 0;
        if (isDone) li.classList.add('done');
        if (isSnoozed) li.classList.add('snoozed');
        if (i === selected) li.classList.add('selected');

        const openRank = items.slice(0, i + 1).filter(x => x.status === 'open').length;

        const textNode = (!isDone && editingIndex === i)
          ? `<input class="item-edit" value="${escHtml(item.text)}" />`
          : `<span class="item-text">${escHtml(item.text)}</span>`;

        const snoozeLabel = isSnoozed ? formatSnoozeUntil(item.snoozed_until) : null;
        const snoozeBadge = snoozeLabel
          ? `<span class="snooze-badge" title="Snoozed">💤 ${snoozeLabel}</span>`
          : '';

        const removeTitle = isDone ? 'Delete permanently' : 'Mark done';

        li.innerHTML = `
          <span class="drag-handle">⠿</span>
          <span class="rank">${isDone ? '✓' : openRank}</span>
          ${textNode}
          ${snoozeBadge}
          <div class="move-btns">
            <button class="move" tabindex="-1" ${(isDone || i === 0 || items[i-1]?.status !== 'open') ? 'disabled' : ''}>▲</button>
            <button class="move" tabindex="-1" ${(isDone || i === items.length - 1 || items[i+1]?.status !== 'open') ? 'disabled' : ''}>▼</button>
          </div>
          <button class="remove" tabindex="-1" title="${removeTitle}">✕</button>
        `;

        if (!isDone) {
          const [upBtn, downBtn] = li.querySelectorAll('.move');
          upBtn.addEventListener('click',   ev => { ev.stopPropagation(); moveItem(i, -1); });
          downBtn.addEventListener('click', ev => { ev.stopPropagation(); moveItem(i,  1); });

          if (!isDone) {
            li.draggable = true;
            li.addEventListener('dragstart', ev => {
              dragSrc = i;
              li.classList.add('dragging');
              ev.dataTransfer.effectAllowed = 'move';
            });
            li.addEventListener('dragend', () => {
              li.classList.remove('dragging');
              document.querySelectorAll('li').forEach(el => el.classList.remove('drag-over'));
            });
            li.addEventListener('dragover', ev => {
              if (isDone) return;
              ev.preventDefault();
              ev.dataTransfer.dropEffect = 'move';
              document.querySelectorAll('li').forEach(el => el.classList.remove('drag-over'));
              li.classList.add('drag-over');
            });
            li.addEventListener('drop', async ev => {
              ev.preventDefault();
              const target = parseInt(li.dataset.index);
              if (dragSrc === null || dragSrc === target) return;
              if (items[dragSrc].status !== 'open' || items[target].status !== 'open') return;
              const [moved] = items.splice(dragSrc, 1);
              items.splice(target, 0, moved);
              selected = target;
              dragSrc = null;
              render();
              await invoke('reorder_items', { ids: items.filter(x => x.status === 'open').map(x => x.id) });
            });
          }
        }

        li.querySelector('.remove').addEventListener('click', ev => {
          ev.stopPropagation();
          closeItem(i);
        });

        li.addEventListener('mousedown', () => { selected = i; });
        li.addEventListener('focus',     () => { selected = i; render(); });

        if (!isDone && editingIndex === i) {
          const inp = li.querySelector('.item-edit');
          inp.addEventListener('keydown', ev => {
            if (ev.key === 'Enter')  { ev.preventDefault(); commitEdit(i, inp); }
            if (ev.key === 'Escape') { render(); focusSelected(); }
          });
          inp.addEventListener('blur', () => commitEdit(i, inp));
        }

        list.appendChild(li);
      });
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
    startPRPolling();
  </script>
</body>
</html>
